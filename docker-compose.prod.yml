services:
  postgres:
    restart: unless-stopped
    ports: !reset []

  redis:
    restart: unless-stopped
    ports: !reset []

  kafka:
    restart: unless-stopped
    ports: !reset []

  app:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  prometheus:
    restart: unless-stopped
    ports: !reset []

  alertmanager:
    restart: unless-stopped
    ports: !reset []

  grafana:
    restart: unless-stopped
    ports: !reset []
