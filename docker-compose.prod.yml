services:
  postgres:
    restart: unless-stopped
    ports: !reset []

  redis:
    restart: unless-stopped
    ports: !reset []

  kafka:
    restart: unless-stopped
    ports: !reset []

  app:
    restart: unless-stopped
    ports: !override []
    environment:
      SPRING_PROFILES_ACTIVE: prod

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-http://localhost}
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  prometheus:
    restart: unless-stopped
    ports: !reset []

  alertmanager:
    restart: unless-stopped
    ports: !reset []

  grafana:
    restart: unless-stopped
    ports: !reset []

volumes:
  caddy_data:
  caddy_config:
