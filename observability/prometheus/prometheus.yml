global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: spring-boot-ecommerce-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app:8080
