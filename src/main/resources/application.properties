spring.application.name=spring-boot-lab
spring.profiles.default=local

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=ecommerce-event-consumer-v2
spring.kafka.consumer.auto-offset-reset=earliest


# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=900000
refresh-token.expiration-days=30

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Spring Boot E-Commerce Backend
info.app.description=Production-oriented e-commerce backend with JWT, Redis, Kafka, Docker, and CI
info.app.version=1.0.0

# Event retention cleanup
event.retention.processed-events-days=30
event.retention.order-event-audit-days=90
event.retention.cleanup.fixed-delay-ms=86400000
event.retention.cleanup.initial-delay-ms=86400000

# Prometheus HTTP latency histograms for Grafana P95/P99
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.95,0.99
