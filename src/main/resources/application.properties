spring.application.name=spring-boot-lab

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/spring_boot_lab}
spring.datasource.username=${DB_USERNAME:ravan}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=ecommerce-event-consumer-v2
spring.kafka.consumer.auto-offset-reset=earliest

