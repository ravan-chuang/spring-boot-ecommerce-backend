spring.application.name=spring-boot-lab

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/spring_boot_lab}
spring.datasource.username=${DB_USERNAME:ravan}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=ecommerce-event-consumer-v2
spring.kafka.consumer.auto-offset-reset=earliest

# JWT
jwt.secret=${JWT_SECRET:U3ByaW5nQm9vdExhYkRldlNlY3JldEtleUZvckpXVFNpZ25pbmdNdXN0QmVMb25nRW5vdWdoMjAyNg==}
jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Spring Boot E-Commerce Backend
info.app.description=Production-oriented e-commerce backend with JWT, Redis, Kafka, Docker, and CI
info.app.version=1.0.0
